name: Update latest profile updates

on:
  workflow_dispatch:
  schedule:
    # 04:30 Europe/Rome (CET/CEST) ≈ 02:30 UTC in summer (CEST)
    - cron: "30 2 * * *"

permissions:
  contents: write

jobs:
  update-latest-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test Latest Updates generator
        run: python -m unittest discover -s tests -v

      - name: Update Latest Updates section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_latest_updates.py

      - name: Commit changes if needed
        run: |
          if git diff --quiet README.md; then
            echo "No README updates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "chore: update profile latest updates"
          git push
